
    <div class="container-fluid p-4">
      <h2 class="mb-4 fw-bold">Notification Preferences</h2>

      <div class="card">
        <div class="card-body">
          <div *ngIf="saveSuccess" class="alert alert-success" data-testid="save-success">
            Preferences saved successfully!
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>Notification</th>
                <th class="text-center">Email</th>
                <th class="text-center">SMS</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let pref of preferences" [attr.data-testid]="pref.testId">
                <td>{{ pref.label }}</td>
                <td class="text-center">
                  <input type="checkbox"
                         class="form-check-input"
                         data-testid="toggle-email"
                         [(ngModel)]="pref.email" />
                </td>
                <td class="text-center">
                  <input type="checkbox"
                         class="form-check-input"
                         data-testid="toggle-sms"
                         [(ngModel)]="pref.sms" />
                </td>
              </tr>
            </tbody>
          </table>

          <div class="mt-3">
            <button class="btn btn-primary"
                    data-testid="save-preferences-btn"
                    (click)="savePreferences()">
              Save Preferences
            </button>
          </div>
        </div>
      </div>
    </div>
